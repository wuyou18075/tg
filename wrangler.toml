name = "cf-tg-web"
main = "./cf-worker-example.js"
compatibility_date = "2024-11-01"
workers_dev = true

# D1 绑定。
# - 你自己 git 部署：保留下方真实 database_id。
# - 新用户「一键部署」：CF 会自动创建新 D1 并回填 ID，覆盖此处的值。
[[d1_databases]]
binding = "DB"
database_name = "tg-cf-web"
database_id = "34bc88ea-5115-4251-b036-a9ebb9e64000"


# 定时任务：每小时整点检查一次，到看板设置的「TG 汇报时间」自动发汇总
[triggers]
crons = ["0 * * * *"]
