name: Deploy to Cloudflare Workers

# 部署开关：仓库根 `.deploy-mode` 文件
#   github  → 由本 GitHub Actions 部署
#   cf      → 跳过本 Actions，由 Cloudflare Workers Builds 部署
# 变量统一用 CF Dashboard「加密变量」，两种方式都不会被删。

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Read deploy mode
        id: mode
        run: |
          m="$(tr -d '[:space:]' < .deploy-mode 2>/dev/null || echo github)"
          case "$m" in
            cf|cloudflare) echo "mode=cf" >> "$GITHUB_OUTPUT"; echo "部署方式 = cf（跳过 GitHub Actions）" ;;
            *)             echo "mode=github" >> "$GITHUB_OUTPUT"; echo "部署方式 = github" ;;
          esac

      - name: Skip (mode=cf)
        if: steps.mode.outputs.mode == 'cf'
        run: echo "已跳过：.deploy-mode=cf。"

      # 部署前：D1 库存在则取其 UUID，不存在则自动创建。无需手填 database_id。
      - name: Ensure D1 database
        if: steps.mode.outputs.mode == 'github'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          DB_NAME="tg-cf-web"
          echo "查询现有 D1 ..."
          npx --yes wrangler@3.109.0 d1 list --json > /tmp/d1.json 2>/dev/null || echo "[]" > /tmp/d1.json
          ID="$(jq -r --arg n "$DB_NAME" '.[] | select(.name==$n) | .uuid' /tmp/d1.json 2>/dev/null | head -1 || true)"
          if [ -z "$ID" ]; then
            echo "未找到 $DB_NAME，自动创建 ..."
            npx --yes wrangler@3.109.0 d1 create "$DB_NAME" --json > /tmp/d1c.json 2>/dev/null || true
            ID="$(jq -r '.uuid // empty' /tmp/d1c.json 2>/dev/null || true)"
            if [ -z "$ID" ]; then
              OUT="$(npx --yes wrangler@3.109.0 d1 create "$DB_NAME" 2>&1 || true)"
              ID="$(printf '%s' "$OUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1 || true)"
            fi
          fi
          if [ -z "$ID" ]; then echo "::error::无法获取或创建 D1，请检查 API Token 是否含 D1 Edit 权限"; exit 1; fi
          echo "D1 $DB_NAME uuid = $ID"
          sed -i "s|^database_id = .*|database_id = \"$ID\"|" wrangler.toml
          echo "已把 database_id 写入 wrangler.toml"

      - name: Deploy Worker
        if: steps.mode.outputs.mode == 'github'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ./cf-worker-example.js --name cf-tg-web --compatibility-date 2024-11-01
          wranglerVersion: "3.109.0"
