name: Deploy to Cloudflare Workers

# 部署开关：仓库根 `.deploy-mode` 文件
#   github  → 由本 GitHub Actions 部署（请到 CF 面板断开 Workers Builds）
#   cf      → 跳过本 Actions，由 Cloudflare Workers Builds 部署
# 变量统一用 CF Dashboard「加密变量」，两种方式都不会被删。

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Read deploy mode
        id: mode
        run: |
          m="$(tr -d '[:space:]' < .deploy-mode 2>/dev/null || echo github)"
          case "$m" in
            cf|cloudflare) echo "mode=cf" >> "$GITHUB_OUTPUT"; echo "部署方式 = cf（跳过 GitHub Actions，由 Cloudflare Builds 部署）" ;;
            *)             echo "mode=github" >> "$GITHUB_OUTPUT"; echo "部署方式 = github" ;;
          esac

      - name: Skip (mode=cf)
        if: steps.mode.outputs.mode == 'cf'
        run: echo "已跳过：.deploy-mode=cf。如需本 Actions 部署，把文件内容改为 github。"

      - name: Deploy Worker
        if: steps.mode.outputs.mode == 'github'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ./cf-worker-example.js --name cf-tg-web --compatibility-date 2024-11-01
          wranglerVersion: "3.109.0"
