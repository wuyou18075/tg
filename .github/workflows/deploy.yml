name: Deploy to Cloudflare Workers

# 只部署代码 + D1 绑定。
# 环境变量（PASSWORD / TG_*）一律在 Cloudflare Dashboard → 加密变量 手动维护，
# 本工作流不读写、不覆盖、不删除。CF Workers Builds 同理。

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy ./cf-worker-example.js --name cf-tg-web --compatibility-date 2024-11-01
          wranglerVersion: "3.109.0"
